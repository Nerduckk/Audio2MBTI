# Audio2MBTI Configuration File
# Schema Version: 1.0

# Project Metadata
project:
  name: "Audio2MBTI"
  version: "1.0.0"
  schema_version: "1.0"
  description: "MBTI prediction system based on music playlist analysis"

# Paths Configuration
paths:
  data_dir: "./data"
  crawl_dir: "./crawl"
  models_dir: "./models"
  logs_dir: "./logs"
  output_dir: "./outputs"
  csv_backup_dir: "./data/backups"

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/audio2mbti.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5
  console_output: true

# Data Configuration
data:
  master_csv: "mbti_master_training_data.csv"
  backup_csv: "mbti_master_training_data_BACKUP.csv"
  batch_size: 25  # Number of rows to batch before saving
  validation_enabled: true
  quality_metrics_enabled: true

# Crawler Output Configuration
crawlers:
  kaggle_csv: "mbti_database_kaggle_reprocessed.csv"
  spotify_csv: "mbti_database_spotify.csv"
  youtube_csv: "mbti_database_youtube.csv"
  applemusic_csv: "mbti_database_applemusic.csv"
  survey_csv: "mbti_database_survey.csv"
  # Files to merge for master database
  merge_sources:
    - "mbti_database_kaggle_reprocessed.csv"
    - "mbti_database_spotify.csv"
    - "mbti_database_youtube.csv"
    - "mbti_database_applemusic.csv"

# Audio Analysis Configuration
audio:
  sample_rate: 22050
  n_mfcc: 13
  n_fft: 2048
  hop_length: 512
  min_duration: 5  # seconds
  max_duration: 600  # seconds (10 minutes)

# NLP Configuration
nlp:
  sentiment_model: "SamLowe/roberta-base-go_emotions"
  batch_size: 8
  max_text_length: 512
  confidence_threshold: 0.3

# API Configuration
apis:
  spotify:
    client_id_env: "SPOTIFY_CLIENT_ID"
    client_secret_env: "SPOTIFY_CLIENT_SECRET"
    timeout: 10
  youtube:
    timeout: 15
  apple_music:
    timeout: 10

# Rate Limiting Configuration
rate_limiting:
  enabled: true
  youtube:
    requests_per_second: 2
    initial_backoff: 1  # seconds
    max_backoff: 300  # seconds (5 minutes)
    max_retries: 5
  spotify:
    requests_per_second: 4
    initial_backoff: 1
    max_backoff: 300
    max_retries: 5
  apple_music:
    requests_per_second: 2
    initial_backoff: 1
    max_backoff: 300
    max_retries: 5

# Retry Configuration
retry:
  enabled: true
  strategy: "exponential_backoff"  # exponential_backoff, linear_backoff, fixed
  initial_delay: 1  # seconds
  max_delay: 300  # seconds
  backoff_multiplier: 2
  jitter: true  # Add random jitter to prevent thundering herd

# Validation Configuration
validation:
  audio_features:
    tempo_range: [60, 240]
    energy_range: [0, 1]
    danceability_range: [0, 1]
    valence_range: [0, 1]
    acousticness_range: [0, 1]
    instrumentalness_range: [0, 1]
    liveness_range: [0, 1]
    speechiness_range: [0, 1]
  lyrics:
    polarity_range: [-1, 1]
    min_words: 5
    max_words: 10000
  required_columns:
    - "title"
    - "artists"
    - "genre"
    - "tempo"
    - "lyrics_polarity"
    - "mbti_label"

# Parallel Processing Configuration
parallel:
  enabled: true
  num_workers: 4
  chunk_size: 10
  use_multiprocessing: true

# Monitoring Configuration
monitoring:
  enabled: true
  metrics_file: "logs/metrics.json"
  collect_performance: true
  collect_quality: true
  verbose: false

# Feature Configuration
features:
  audio_features:
    - "tempo"
    - "tempo_strength"
    - "energy"
    - "danceability"
    - "valence"
    - "acousticness"
    - "instrumentalness"
    - "liveness"
    - "speechiness"
    - "loudness"
    - "zero_crossing_rate"
    - "spectral_bandwidth"
    - "spectral_centroid"
    - "mfcc_mean"
    - "mfcc_std"
  
  nlp_features:
    - "lyrics_polarity"
    - "lyrics_wordcount"
    - "emotion_class"
    - "emotion_confidence"

# Preprocessing Configuration
preprocessing:
  lowercase_text: true
  remove_special_chars: true
  transliterate: true
  translate_to_english: true
  emotional_analysis: true

# Model Configuration
models:
  xgboost:
    path: "models/mbti_xgboost_master.json"
    version: "1.0"
    required_features: 25
