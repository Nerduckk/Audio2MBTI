cnn:
  feature_extraction:
    sr: 22050
    n_mels: 128
    n_fft: 2048
    hop_length: 512
    duration: 30
    target_shape: [128, 1290]

  model:
    channels: [32, 64, 128, 256]
    conv_dropout: 0.25
    dense_hidden: [512, 256]
    dense_dropout: [0.3, 0.2]

  training:
    batch_size: 32          # ↑ tăng batch size → gradient ổn định hơn
    learning_rate: 0.0005   # ↓ giảm learning rate → học chậm, ổn định hơn
    epochs: 50              # ↑ tăng epochs vì có đủ data
    early_stopping_patience: 10  # ↑ tăng patience (model có thể improve lâu)
    min_val_accuracy: 0.60
    min_val_accuracy_epoch: 10
    test_size: 0.1
    val_size: 0.1
    random_state: 42
    output_dim: 4
    device: auto

  augmentation:
    enabled: true
    freq_mask_param: 24
    time_mask_param: 48
    probability: 0.5

  paths:
    metadata_csv: "./data/mbti_cnn_metadata.csv"
    audio_dir: "./data/audio_files"
    cache_dir: "./data/cnn_cache"
    models_dir: "./models/cnn"
    results_dir: "./outputs/cnn"
